<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Diagnostic</title>
<style>
  body { font-family: 'Courier New', monospace; padding: 20px; background: #1a1a2e; color: #eee; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: #00d4ff; margin-bottom: 20px; }
  .section { background: #16213e; padding: 20px; margin: 20px 0; border-radius: 8px; border: 1px solid #0f3460; }
  .section h2 { color: #e94560; margin-top: 0; }
  .test-item { padding: 10px; margin: 5px 0; background: #1a1a2e; border-left: 3px solid #333; }
  .test-item.pass { border-left-color: #00ff88; }
  .test-item.fail { border-left-color: #ff3366; }
  .test-item .status { font-weight: bold; }
  .test-item.pass .status { color: #00ff88; }
  .test-item.fail .status { color: #ff3366; }
  button { padding: 10px 20px; background: #00d4ff; color: #1a1a2e; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; }
  button:hover { background: #00a8cc; }
  pre { background: #0f0f1a; padding: 10px; border-radius: 4px; overflow-x: auto; }
  .device-info { font-size: 12px; color: #888; }
  .log { background: #0f0f1a; padding: 15px; border-radius: 4px; max-height: 300px; overflow-y: auto; font-size: 12px; }
  .log-entry { margin: 5px 0; }
  .log-entry.info { color: #00d4ff; }
  .log-entry.success { color: #00ff88; }
  .log-entry.error { color: #ff3366; }
  .log-entry.warn { color: #ffcc00; }
</style>
</head>
<body>
<div class="container">
  <h1>🔬 System Diagnostic Tool</h1>
  
  <button id="run-tests-btn">▶ Run All Tests</button>
  <button id="export-btn">📥 Export Report</button>
  
  <div class="section">
    <h2>🖥️ Device Fingerprint</h2>
    <div id="device-info" class="device-info">Loading...</div>
  </div>
  
  <div class="section">
    <h2>🌐 API Tests</h2>
    <div id="api-tests">Click "Run All Tests" to begin</div>
  </div>
  
  <div class="section">
    <h2>🎨 UI Tests</h2>
    <div id="ui-tests">Click "Run All Tests" to begin</div>
  </div>
  
  <div class="section">
    <h2>🔐 Login Flow Test</h2>
    <div id="login-tests">Click "Run All Tests" to begin</div>
  </div>
  
  <div class="section">
    <h2>📋 Diagnostic Log</h2>
    <div id="log" class="log"></div>
  </div>
</div>
<script src="/biubo-cgi/diagnostic.js"></script>
</body>
</html>
