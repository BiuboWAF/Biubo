<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Diagnostic</title>
<style>
  body { font-family: 'Courier New', monospace; padding: 20px; background: #1a1a2e; color: #eee; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: #00d4ff; margin-bottom: 20px; }
  .section { background: #16213e; padding: 20px; margin: 20px 0; border-radius: 8px; border: 1px solid #0f3460; }
  .section h2 { color: #e94560; margin-top: 0; }
  .test-item { padding: 10px; margin: 5px 0; background: #1a1a2e; border-left: 3px solid #333; }
  .test-item.pass { border-left-color: #00ff88; }
  .test-item.fail { border-left-color: #ff3366; }
  .test-item .status { font-weight: bold; }
  .test-item.pass .status { color: #00ff88; }
  .test-item.fail .status { color: #ff3366; }
  button { padding: 10px 20px; background: #00d4ff; color: #1a1a2e; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; }
  button:hover { background: #00a8cc; }
  pre { background: #0f0f1a; padding: 10px; border-radius: 4px; overflow-x: auto; }
  .device-info { font-size: 12px; color: #888; }
  .log { background: #0f0f1a; padding: 15px; border-radius: 4px; max-height: 300px; overflow-y: auto; font-size: 12px; }
  .log-entry { margin: 5px 0; }
  .log-entry.info { color: #00d4ff; }
  .log-entry.success { color: #00ff88; }
  .log-entry.error { color: #ff3366; }
  .log-entry.warn { color: #ffcc00; }
</style>
</head>
<body>
<div class="container">
  <h1>🔬 System Diagnostic Tool</h1>
  
  <button onclick="runAllTests()">▶ Run All Tests</button>
  <button onclick="exportReport()">📥 Export Report</button>
  
  <div class="section">
    <h2>🖥️ Device Fingerprint</h2>
    <div id="device-info" class="device-info">Loading...</div>
  </div>
  
  <div class="section">
    <h2>🌐 API Tests</h2>
    <div id="api-tests">Click "Run All Tests" to begin</div>
  </div>
  
  <div class="section">
    <h2>🎨 UI Tests</h2>
    <div id="ui-tests">Click "Run All Tests" to begin</div>
  </div>
  
  <div class="section">
    <h2>🔐 Login Flow Test</h2>
    <div id="login-tests">Click "Run All Tests" to begin</div>
  </div>
  
  <div class="section">
    <h2>📋 Diagnostic Log</h2>
    <div id="log" class="log"></div>
  </div>
</div>
<script>
const logs = [];

function log(message, type = 'info') {
  const entry = { time: new Date().toISOString(), message, type };
  logs.push(entry);
  const logDiv = document.getElementById('log');
  const entryDiv = document.createElement('div');
  entryDiv.className = `log-entry ${type}`;
  entryDiv.textContent = `[${entry.time}] [${type.toUpperCase()}] ${message}`;
  logDiv.appendChild(entryDiv);
  logDiv.scrollTop = logDiv.scrollHeight;
}

function collectDeviceFingerprint() {
  const info = {
    userAgent: navigator.userAgent,
    language: navigator.language,
    platform: navigator.platform,
    screen: {
      width: screen.width,
      height: screen.height,
      availWidth: screen.availWidth,
      availHeight: screen.availHeight,
      colorDepth: screen.colorDepth,
      pixelDepth: screen.pixelDepth
    },
    window: {
      innerWidth: window.innerWidth,
      innerHeight: window.innerHeight,
      outerWidth: window.outerWidth,
      outerHeight: window.outerHeight
    },
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    cookiesEnabled: navigator.cookieEnabled,
    doNotTrack: navigator.doNotTrack,
    hardwareConcurrency: navigator.hardwareConcurrency,
    deviceMemory: navigator.deviceMemory,
    touchPoints: navigator.maxTouchPoints,
    connection: navigator.connection ? {
      effectiveType: navigator.connection.effectiveType,
      downlink: navigator.connection.downlink,
      rtt: navigator.connection.rtt
    } : null,
    plugins: Array.from(navigator.plugins).map(p => p.name),
    mimeTypes: Array.from(navigator.mimeTypes).map(m => m.type)
  };
  
  document.getElementById('device-info').innerHTML = `<pre>${JSON.stringify(info, null, 2)}</pre>`;
  log('Device fingerprint collected', 'success');
  return info;
}

async function testAPI(name, url, method = 'GET', body = null) {
  log(`Testing API: ${name} (${method} ${url})`, 'info');
  const testDiv = document.createElement('div');
  testDiv.className = 'test-item';
  testDiv.innerHTML = `<span class="status">Testing...</span> ${name}`;
  document.getElementById('api-tests').appendChild(testDiv);
  
  try {
    const options = {
      method,
      headers: { 'Content-Type': 'application/json' }
    };
    if (body) options.body = JSON.stringify(body);
    
    const response = await fetch(url, options);
    const data = await response.json().catch(() => ({ status: response.status, text: await response.text() }));
    
    testDiv.className = response.ok ? 'test-item pass' : 'test-item fail';
    testDiv.innerHTML = `<span class="status">${response.ok ? 'PASS' : 'FAIL'}</span> ${name} (${response.status})`;
    
    log(`API ${name}: ${response.ok ? 'PASS' : 'FAIL'} (${response.status})`, response.ok ? 'success' : 'error');
    
    return { name, url, status: response.status, ok: response.ok, data };
  } catch (error) {
    testDiv.className = 'test-item fail';
    testDiv.innerHTML = `<span class="status">FAIL</span> ${name} (${error.message})`;
    log(`API ${name}: FAIL (${error.message})`, 'error');
    return { name, url, status: 0, ok: false, error: error.message };
  }
}

function testUI(name, testFn) {
  log(`Testing UI: ${name}`, 'info');
  const testDiv = document.createElement('div');
  testDiv.className = 'test-item';
  testDiv.innerHTML = `<span class="status">Testing...</span> ${name}`;
  document.getElementById('ui-tests').appendChild(testDiv);
  
  try {
    const result = testFn();
    if (result) {
      testDiv.className = 'test-item pass';
      testDiv.innerHTML = `<span class="status">PASS</span> ${name}`;
      log(`UI ${name}: PASS`, 'success');
    } else {
      throw new Error('Test condition not met');
    }
  } catch (error) {
    testDiv.className = 'test-item fail';
    testDiv.innerHTML = `<span class="status">FAIL</span> ${name} (${error.message})`;
    log(`UI ${name}: FAIL (${error.message})`, 'error');
  }
}

async function runAllTests() {
  document.getElementById('api-tests').innerHTML = '';
  document.getElementById('ui-tests').innerHTML = '';
  document.getElementById('login-tests').innerHTML = '';
  document.getElementById('log').innerHTML = '';
  
  log('Starting diagnostic tests...', 'info');
  
  // Collect device fingerprint
  collectDeviceFingerprint();
  
  // Test API endpoints
  const apiTests = [
    { name: 'Login Page', url: '/biubo-cgi/dashboard/login' },
    { name: 'Simple Login API', url: '/biubo-cgi/dashboard/api/simple-login', method: 'POST', body: { password: 'biubo123456' } },
    { name: 'Change Password API', url: '/biubo-cgi/dashboard/api/change-password', method: 'POST', body: { old_password: 'biubo123456', new_password: 'testpass123', confirm_password: 'testpass123' } },
    { name: 'Check Auth API', url: '/biubo-cgi/dashboard/api/check-auth' },
    { name: 'Dashboard API', url: '/biubo-cgi/dashboard' }
  ];
  
  for (const test of apiTests) {
    await testAPI(test.name, test.url, test.method || 'GET', test.body || null);
  }
  
  // Test UI elements
  testUI('JavaScript Enabled', () => {
    return typeof window !== 'undefined' && typeof document !== 'undefined';
  });
  
  testUI('Fetch API Available', () => {
    return typeof fetch !== 'undefined';
  });
  
  testUI('LocalStorage Available', () => {
    try {
      localStorage.setItem('test', 'test');
      localStorage.removeItem('test');
      return true;
    } catch (e) {
      return false;
    }
  });
  
  testUI('SessionStorage Available', () => {
    try {
      sessionStorage.setItem('test', 'test');
      sessionStorage.removeItem('test');
      return true;
    } catch (e) {
      return false;
    }
  });
  
  testUI('Cookies Enabled', () => {
    return navigator.cookieEnabled;
  });
  
  // Test login flow
  log('Testing login flow...', 'info');
  const loginTestDiv = document.createElement('div');
  loginTestDiv.className = 'test-item';
  loginTestDiv.innerHTML = `<span class="status">Testing...</span> Login Flow`;
  document.getElementById('login-tests').appendChild(loginTestDiv);
  
  try {
    // Step 1: Login
    log('Step 1: Login with default password', 'info');
    const loginResponse = await fetch('/biubo-cgi/dashboard/api/simple-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: 'biubo123456' })
    });
    const loginData = await loginResponse.json();
    log(`Login response: ${JSON.stringify(loginData)}`, 'info');
    
    if (loginData.status === 'success') {
      log('Step 1: PASS - Login successful', 'success');
      
      // Step 2: Check if force_password_change
      if (loginData.force_password_change) {
        log('Step 2: Force password change required', 'warn');
        
        // Step 3: Try to change password
        log('Step 3: Changing password', 'info');
        const changeResponse = await fetch('/biubo-cgi/dashboard/api/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            old_password: 'biubo123456',
            new_password: 'testpass123',
            confirm_password: 'testpass123'
          })
        });
        const changeData = await changeResponse.json();
        log(`Change password response: ${JSON.stringify(changeData)}`, 'info');
        
        if (changeData.status === 'success') {
          log('Step 3: PASS - Password changed', 'success');
          loginTestDiv.className = 'test-item pass';
          loginTestDiv.innerHTML = `<span class="status">PASS</span> Login Flow (with password change)`;
        } else {
          log(`Step 3: FAIL - ${changeData.msg}`, 'error');
          loginTestDiv.className = 'test-item fail';
          loginTestDiv.innerHTML = `<span class="status">FAIL</span> Login Flow (password change failed)`;
        }
      } else {
        log('Step 2: No password change required', 'info');
        loginTestDiv.className = 'test-item pass';
        loginTestDiv.innerHTML = `<span class="status">PASS</span> Login Flow (no password change)`;
      }
    } else {
      log(`Step 1: FAIL - ${loginData.msg}`, 'error');
      loginTestDiv.className = 'test-item fail';
      loginTestDiv.innerHTML = `<span class="status">FAIL</span> Login Flow (login failed)`;
    }
  } catch (error) {
    log(`Login flow error: ${error.message}`, 'error');
    loginTestDiv.className = 'test-item fail';
    loginTestDiv.innerHTML = `<span class="status">FAIL</span> Login Flow (${error.message})`;
  }
  
  log('All tests completed', 'success');
}

function exportReport() {
  const report = {
    timestamp: new Date().toISOString(),
    deviceFingerprint: JSON.parse(document.getElementById('device-info').textContent),
    logs: logs
  };
  
  const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `diagnostic-report-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  
  log('Report exported', 'success');
}

// Auto-run on load
window.onload = function() {
  log('Diagnostic page loaded', 'info');
  collectDeviceFingerprint();
};
</script>
</body>
</html>
